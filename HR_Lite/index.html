<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR-Lite - Hệ thống Quản lý Nhân sự</title>
    <link rel="stylesheet" href="style.css">
    <style></style>
</head>
<body>

    <h2>🚀 Hệ thống Quản trị HR-Lite</h2>

    <div class="card">
        <h3>➕ Thêm Nhân viên Mới</h3>
        <form id="employeeForm">
            <div class="form-group">
                <input type="text" id="empName" placeholder="Họ và tên nhân viên..." required>
                <input type="number" id="empSalary" placeholder="Lương (VNĐ)" required min="0">
                <button type="submit">Thêm ngay</button>
            </div>
        </form>
    </div>

    <div class="card">
        <h3>🔍 Bộ lọc tìm kiếm</h3>
        <input type="text" id="searchInput" placeholder="Nhập tên nhân viên để lọc danh sách...">
    </div>

    <div class="card">
        <h3>👥 Danh sách Nhân sự hiện tại</h3>
        <ul id="employeeList" class="employee-list">
            <li style="color: gray; font-style: italic;">Đang tải dữ liệu...</li>
        </ul>

        <div class="total-section">
            Tổng quỹ lương: <span id="totalSalary">0</span> VNĐ
        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
