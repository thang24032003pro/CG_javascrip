<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Radar Orion - Version 1.0</title>
    <style>
        body { 
            background-color: #000; 
            color: #0f0; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        canvas { 
            border: 2px solid #0f0; 
            background-color: #050505; 
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            cursor: crosshair;
        }
        .panel { margin-top: 15px; text-align: center; }
        .status { color: #fff; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2>ORION RADAR SYSTEM - ALIVE</h2>
    <div class="status" id="statusLog">Hệ thống: Đang quét...</div>
    
    <canvas id="radarCanvas" width="600" height="600"></canvas>

    <div class="panel">
        <p>Lưu ý: Click vào điểm sáng để xác định mục tiêu.</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
